version: "3.9"

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: ds-platform-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: ds-platform-backend
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=dsplatform
      - POSTGRES_PASSWORD=dsplatform123
      - POSTGRES_DB=ds_platform
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=neo4j123456
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=change-me-in-production-use-a-long-random-string
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: ds-platform-postgres
    environment:
      POSTGRES_USER: dsplatform
      POSTGRES_PASSWORD: dsplatform123
      POSTGRES_DB: ds_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dsplatform -d ds_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: ds-platform-neo4j
    environment:
      NEO4J_AUTH: neo4j/neo4j123456
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"   # HTTP
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./database/neo4j_init.cypher:/import/init.cypher:ro
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p neo4j123456 'RETURN 1' 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ds-platform-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
